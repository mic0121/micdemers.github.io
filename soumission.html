    <style>
        body { background-color: #050505; }
        
        .contact-header {
            padding: 180px 20px 60px; /* Plus d'espace pour le header fixe */
            text-align: center;
            background: linear-gradient(to bottom, #111, #050505);
        }

        .contact-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .contact-title {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--gold, #D4AF37);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .contact-subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-style: italic;
            color: #ccc;
            margin-bottom: 30px;
        }

        .email-link {
            color: var(--gold, #D4AF37);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .email-link:hover {
            border-bottom: 1px solid #D4AF37;
        }

        /* Ajustement du formulaire MailerLite pour qu'il soit plus élégant */
        .ml-embedded { margin-top: 40px; }

        @media (max-width: 768px) {
            .contact-title { font-size: 2rem; }
            .contact-header { padding-top: 140px; }
